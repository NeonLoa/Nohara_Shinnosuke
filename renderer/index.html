<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="pet.css">
</head>
<body>
<div id="pet-container">
  <div id="bubble" class="hidden">
    <span id="bubble-text"></span>
    <input id="bubble-input" class="hidden" placeholder="和小新说点什么..." maxlength="200" autocomplete="off">
  </div>
  <img id="pet-img" src="../assets/野原新之助.png" draggable="false">
  <div id="zzz" class="hidden">zZZ</div>
</div>

<div id="context-menu" class="hidden">
  <div class="menu-item" data-action="talk">💬 说点什么</div>
  <div class="menu-item" data-action="settings">⚙ 设置...</div>
  <div class="menu-item separator"></div>
  <div class="menu-item" data-action="quit">✕ 退出</div>
</div>

<script src="pet.js"></script>
</body>
</html>
